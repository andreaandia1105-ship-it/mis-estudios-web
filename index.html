<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Cursos — Repositorio de Estudio</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Source+Sans+3:wght@300;400;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Source Sans 3',sans-serif;background:#0a0f1a;color:#e2e8f0;min-height:100vh}
header{background:#0f1e3a;padding:24px 20px 20px;border-bottom:1px solid rgba(255,255,255,0.07)}
.hinner{max-width:960px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
header h1{font-family:'Oswald',sans-serif;font-size:22px;font-weight:700;color:#fff;letter-spacing:.4px}
header p{font-size:12px;color:#475569;margin-top:2px}
#total-badge{font-size:11px;padding:4px 12px;border-radius:20px;background:rgba(255,255,255,0.08);color:#64748b}
.search-wrap{background:#0d1525;border-bottom:1px solid rgba(255,255,255,0.06);padding:12px 20px}
.search-wrap input{width:100%;max-width:960px;display:block;margin:0 auto;background:#1a2332;border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:10px 16px;color:#e2e8f0;font-size:14px;font-family:'Source Sans 3',sans-serif;outline:none}
.search-wrap input:focus{border-color:#3b82f6}
.search-wrap input::placeholder{color:#334155}
main{max-width:960px;margin:0 auto;padding:20px 20px 60px}
.curso-section{margin-bottom:32px}
.curso-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,0.06)}
.curso-icon{font-size:18px;line-height:1}
.curso-title{font-family:'Oswald',sans-serif;font-size:16px;font-weight:700;letter-spacing:.3px}
.curso-count{font-size:11px;padding:2px 8px;border-radius:20px;margin-left:auto}
.color-blue .curso-title{color:#93c5fd}.color-blue .curso-count{background:#1e3a5f;color:#93c5fd}
.color-green .curso-title{color:#86efac}.color-green .curso-count{background:#14532d;color:#86efac}
.color-amber .curso-title{color:#fcd34d}.color-amber .curso-count{background:#431407;color:#fcd34d}
.color-purple .curso-title{color:#d8b4fe}.color-purple .curso-count{background:#2e1065;color:#d8b4fe}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
.card{background:#111827;border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:16px;cursor:pointer;text-decoration:none;display:block;transition:transform 0.12s,border-color 0.12s,background 0.12s}
.card:hover{transform:translateY(-2px);background:#1a2332}
.color-blue .card:hover{border-color:rgba(59,130,246,0.35)}
.color-green .card:hover{border-color:rgba(34,197,94,0.35)}
.color-amber .card:hover{border-color:rgba(245,158,11,0.35)}
.color-purple .card:hover{border-color:rgba(168,85,247,0.35)}
.card-num{font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;margin-bottom:6px;opacity:.7}
.color-blue .card-num{color:#60a5fa}.color-green .card-num{color:#4ade80}
.color-amber .card-num{color:#fbbf24}.color-purple .card-num{color:#c084fc}
.card h2{font-family:'Oswald',sans-serif;font-size:14px;font-weight:700;color:#e2e8f0;margin-bottom:6px;line-height:1.3}
.card p{font-size:12px;color:#475569;line-height:1.5}
.card-dot-row{display:flex;align-items:center;gap:5px;margin-top:10px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.05)}
.dot{width:5px;height:5px;border-radius:50%;background:#22c55e;flex-shrink:0}
.card-dot-row span{font-size:10px;color:#334155}
.empty-state{background:#0d1525;border:1px dashed rgba(255,255,255,0.08);border-radius:12px;padding:20px;text-align:center}
.empty-state p{font-size:12px;color:#1e3a5f}
.hidden{display:none!important}
</style>
</head>
<body>
<header>
  <div class="hinner">
    <div><h1>📚 Mis Cursos</h1><p>Repositorio de resúmenes por lectura</p></div>
    <span id="total-badge">cargando...</span>
  </div>
</header>
<div class="search-wrap">
  <input type="text" id="searchInput" placeholder="Buscar por tema, concepto, lectura..." oninput="filterCards()">
</div>
<main id="main"></main>
<script>
fetch('lecturas.json')
  .then(r=>r.json())
  .then(data=>{
    const main=document.getElementById('main');
    let total=0;
    data.forEach(curso=>{
      total+=curso.lecturas.length;
      const sec=document.createElement('div');
      sec.className=`curso-section color-${curso.color}`;
      const count=curso.lecturas.length;
      sec.innerHTML=`
        <div class="curso-header">
          <span class="curso-icon">${curso.icono}</span>
          <span class="curso-title">${curso.curso}</span>
          <span class="curso-count">${count} lectura${count!==1?'s':''}</span>
        </div>
        <div class="grid">
          ${count===0
            ?'<div class="empty-state"><p>Sin lecturas aún — agrega archivos en la carpeta y actualiza lecturas.json</p></div>'
            :curso.lecturas.map(l=>`
              <a class="card" href="${l.archivo}" data-keywords="${l.keywords} ${l.titulo} ${curso.curso}">
                <div class="card-num">${l.numero}</div>
                <h2>${l.titulo}</h2>
                <p>${l.descripcion}</p>
                <div class="card-dot-row"><span class="dot"></span><span>Canvas disponible</span></div>
              </a>`).join('')}
        </div>`;
      main.appendChild(sec);
    });
    document.getElementById('total-badge').textContent=`${data.length} cursos · ${total} lecturas`;
  })
  .catch(()=>{
    document.getElementById('main').innerHTML='<p style="color:#475569;padding:2rem;text-align:center">Abre desde Netlify, no directamente como archivo local.</p>';
  });
function filterCards(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  document.querySelectorAll('.card').forEach(card=>{
    const text=(card.innerText+' '+(card.dataset.keywords||'')).toLowerCase();
    card.classList.toggle('hidden',q.length>1&&!text.includes(q));
  });
}
</script>
</body>
</html>
